<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 Backend Engineer 30-Day Job Accelerator</title>
<style>
/* ============================================================
   DESIGN TOKENS
============================================================ */
:root{
  --accent:#6366f1;
  --accent-2:#8b5cf6;
  --accent-rgb:99,102,241;
  --bg:#f5f6fa;
  --bg-elevated:#ffffff;
  --bg-card:#ffffff;
  --bg-hover:#eef0f6;
  --border:#e4e6ee;
  --text:#12141c;
  --text-muted:#6b7080;
  --text-faint:#9aa0b0;
  --success:#10b981;
  --warning:#f59e0b;
  --danger:#ef4444;
  --info:#3b82f6;
  --shadow-sm:0 1px 2px rgba(20,20,40,.04);
  --shadow-md:0 4px 16px rgba(20,20,40,.06);
  --shadow-lg:0 12px 40px rgba(20,20,40,.10);
  --radius-sm:8px;
  --radius-md:14px;
  --radius-lg:20px;
  --sidebar-w:260px;
  --header-h:64px;
  --font: -apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
[data-theme="dark"]{
  --bg:#0a0b0f;
  --bg-elevated:#121319;
  --bg-card:#15161d;
  --bg-hover:#1d1f28;
  --border:#24262f;
  --text:#f3f4f8;
  --text-muted:#9498a8;
  --text-faint:#5c6070;
  --shadow-sm:0 1px 2px rgba(0,0,0,.3);
  --shadow-md:0 4px 20px rgba(0,0,0,.35);
  --shadow-lg:0 16px 48px rgba(0,0,0,.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  transition:background .25s ease,color .25s ease;
}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}
::-webkit-scrollbar-thumb:hover{background:var(--text-faint);}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;color:var(--text);}

/* ============================================================
   APP SHELL
============================================================ */
#app{display:flex;height:100vh;width:100vw;}

/* SIDEBAR */
#sidebar{
  width:var(--sidebar-w);
  flex-shrink:0;
  background:var(--bg-elevated);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  height:100vh;
  transition:transform .25s ease, width .25s ease;
  z-index:50;
}
.sidebar-brand{
  display:flex;align-items:center;gap:10px;
  padding:20px 20px 16px;
}
.brand-logo{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  display:flex;align-items:center;justify-content:center;
  font-size:18px;box-shadow:0 4px 14px rgba(var(--accent-rgb),.35);
  flex-shrink:0;
}
.brand-text{overflow:hidden;}
.brand-title{font-size:13.5px;font-weight:700;line-height:1.25;white-space:nowrap;}
.brand-sub{font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.sidebar-search{
  margin:0 14px 10px;
  display:flex;align-items:center;gap:8px;
  background:var(--bg-hover);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:8px 10px;
  color:var(--text-faint);
  font-size:12.5px;
}
.sidebar-search input{background:transparent;border:none;outline:none;flex:1;color:var(--text);font-size:12.5px;}
.kbd{
  font-size:10.5px;background:var(--bg-card);border:1px solid var(--border);
  border-radius:5px;padding:1px 5px;color:var(--text-faint);
}

.sidebar-nav{flex:1;overflow-y:auto;padding:4px 10px 10px;}
.nav-section-label{
  font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;
  color:var(--text-faint);font-weight:700;
  padding:14px 10px 6px;
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:8.5px 10px;margin-bottom:2px;
  border-radius:var(--radius-sm);
  font-size:13.3px;font-weight:500;color:var(--text-muted);
  transition:background .15s ease,color .15s ease;
  position:relative;
}
.nav-item .nav-icon{width:17px;text-align:center;font-size:14.5px;flex-shrink:0;}
.nav-item .nav-badge{
  margin-left:auto;font-size:10.5px;font-weight:700;
  background:var(--bg-hover);color:var(--text-muted);
  border-radius:20px;padding:1px 7px;
}
.nav-item:hover{background:var(--bg-hover);color:var(--text);}
.nav-item.active{
  background:linear-gradient(135deg,rgba(var(--accent-rgb),.14),rgba(var(--accent-rgb),.05));
  color:var(--accent);font-weight:700;
}
.nav-item.active .nav-badge{background:var(--accent);color:#fff;}
.nav-item.active::before{
  content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);
  width:3px;height:60%;background:var(--accent);border-radius:0 4px 4px 0;
}

.sidebar-footer{
  padding:12px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.streak-pill{
  display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;
  background:var(--bg-hover);padding:7px 10px;border-radius:20px;flex:1;
}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;height:100vh;min-width:0;}
#header{
  height:var(--header-h);flex-shrink:0;
  display:flex;align-items:center;gap:14px;
  padding:0 24px;
  border-bottom:1px solid var(--border);
  background:rgba(var(--accent-rgb),0);
  backdrop-filter:blur(10px);
  position:sticky;top:0;z-index:40;
  background:color-mix(in srgb, var(--bg) 70%, transparent);
}
#menuToggle{
  display:none;background:var(--bg-card);border:1px solid var(--border);
  width:36px;height:36px;border-radius:10px;align-items:center;justify-content:center;
  font-size:16px;color:var(--text);
}
.header-title{font-size:18px;font-weight:700;}
.header-sub{font-size:12px;color:var(--text-muted);margin-top:1px;}
.header-spacer{flex:1;}
.header-actions{display:flex;align-items:center;gap:10px;}
.icon-btn{
  width:38px;height:38px;border-radius:10px;border:1px solid var(--border);
  background:var(--bg-card);display:flex;align-items:center;justify-content:center;
  font-size:15px;color:var(--text-muted);transition:all .15s ease;
}
.icon-btn:hover{background:var(--bg-hover);color:var(--text);transform:translateY(-1px);box-shadow:var(--shadow-sm);}
.btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 16px;border-radius:10px;border:1px solid var(--border);
  background:var(--bg-card);color:var(--text);font-size:13px;font-weight:600;
  transition:all .15s ease;white-space:nowrap;
}
.btn:hover{background:var(--bg-hover);transform:translateY(-1px);box-shadow:var(--shadow-sm);}
.btn-primary{
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(var(--accent-rgb),.3);
}
.btn-primary:hover{box-shadow:0 6px 20px rgba(var(--accent-rgb),.45);}
.btn-danger{color:var(--danger);}
.btn-sm{padding:6px 11px;font-size:12px;border-radius:8px;}
.btn-icon-only{padding:9px;}

#viewport{flex:1;overflow-y:auto;padding:24px 28px 60px;}
.view{display:none;animation:fadeUp .35s ease;}
.view.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.page-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;gap:16px;flex-wrap:wrap;}
.page-head h1{font-size:22px;font-weight:800;letter-spacing:-.01em;}
.page-head p{color:var(--text-muted);font-size:13px;margin-top:4px;}

/* CARDS & GRID */
.grid{display:grid;gap:16px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
@media(max-width:1200px){.grid-4{grid-template-columns:repeat(2,1fr);}.grid-3{grid-template-columns:repeat(2,1fr);}}
@media(max-width:640px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr;}}

.card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);
  padding:18px;box-shadow:var(--shadow-sm);transition:box-shadow .2s ease, transform .2s ease;
}
.card:hover{box-shadow:var(--shadow-md);}
.glass{
  background:color-mix(in srgb, var(--bg-card) 70%, transparent);
  backdrop-filter:blur(16px);
  border:1px solid color-mix(in srgb, var(--border) 80%, transparent);
}

.kpi-card{position:relative;overflow:hidden;}
.kpi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.kpi-icon{
  width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:16px;background:rgba(var(--accent-rgb),.12);color:var(--accent);
}
.kpi-trend{font-size:11px;font-weight:700;padding:2px 7px;border-radius:20px;}
.trend-up{color:var(--success);background:rgba(16,185,129,.12);}
.trend-down{color:var(--danger);background:rgba(239,68,68,.12);}
.kpi-value{font-size:26px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;}
.kpi-label{font-size:12.5px;color:var(--text-muted);margin-top:2px;}

.section-title{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.section-title .tag{font-size:10.5px;background:var(--bg-hover);color:var(--text-muted);padding:2px 8px;border-radius:20px;font-weight:700;}

/* PROGRESS */
.progress-track{height:8px;border-radius:20px;background:var(--bg-hover);overflow:hidden;}
.progress-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--accent),var(--accent-2));transition:width .6s cubic-bezier(.4,0,.2,1);}
.progress-fill.success{background:linear-gradient(90deg,#10b981,#34d399);}
.progress-fill.warn{background:linear-gradient(90deg,#f59e0b,#fbbf24);}

/* TABLE */
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--bg-card);}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:900px;}
thead th{
  text-align:left;padding:11px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;
  color:var(--text-faint);border-bottom:1px solid var(--border);background:var(--bg-hover);white-space:nowrap;
  position:sticky;top:0;
}
tbody td{padding:11px 14px;border-bottom:1px solid var(--border);white-space:nowrap;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--bg-hover);}
tbody td.wrap{white-space:normal;max-width:220px;}

.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.badge-gray{background:var(--bg-hover);color:var(--text-muted);}
.badge-blue{background:rgba(59,130,246,.13);color:#3b82f6;}
.badge-green{background:rgba(16,185,129,.13);color:#10b981;}
.badge-yellow{background:rgba(245,158,11,.15);color:#f59e0b;}
.badge-red{background:rgba(239,68,68,.13);color:#ef4444;}
.badge-purple{background:rgba(139,92,246,.14);color:#8b5cf6;}

/* FORMS */
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:5px;}
.field input,.field select,.field textarea{
  width:100%;padding:9px 11px;border-radius:9px;border:1px solid var(--border);
  background:var(--bg-hover);font-size:13px;outline:none;transition:border-color .15s ease;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
.field textarea{resize:vertical;min-height:70px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:640px){.form-row{grid-template-columns:1fr;}}

.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.toolbar input[type=text],.toolbar input[type=search]{
  padding:9px 12px;border-radius:9px;border:1px solid var(--border);background:var(--bg-card);
  font-size:13px;outline:none;min-width:200px;
}
.toolbar select{padding:9px 12px;border-radius:9px;border:1px solid var(--border);background:var(--bg-card);font-size:13px;}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(10,11,15,.55);backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;z-index:200;padding:20px;
}
.modal-overlay.active{display:flex;}
.modal{
  background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-lg);
  width:100%;max-width:560px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg);
  animation:modalIn .25s ease;
}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);}
.modal-head h3{font-size:15.5px;font-weight:700;}
.modal-body{padding:20px 22px;}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 22px;border-top:1px solid var(--border);}

/* TOAST */
#toastWrap{position:fixed;bottom:24px;right:24px;z-index:300;display:flex;flex-direction:column;gap:10px;}
.toast{
  background:var(--bg-elevated);border:1px solid var(--border);box-shadow:var(--shadow-lg);
  border-radius:12px;padding:12px 16px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;
  min-width:240px;animation:toastIn .3s ease;
}
@keyframes toastIn{from{opacity:0;transform:translateX(30px);}to{opacity:1;transform:translateX(0);}}
.toast.success{border-left:3px solid var(--success);}
.toast.error{border-left:3px solid var(--danger);}
.toast.info{border-left:3px solid var(--info);}

/* MISC */
.empty-state{text-align:center;padding:50px 20px;color:var(--text-muted);}
.empty-state .em-icon{font-size:36px;margin-bottom:10px;}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--bg-hover);border-radius:20px;padding:4px 10px;font-size:11.5px;font-weight:600;color:var(--text-muted);}
.hidden{display:none !important;}
.flex-between{display:flex;align-items:center;justify-content:space-between;}
.mt-8{margin-top:8px;}.mt-16{margin-top:16px;}.mb-8{margin-bottom:8px;}
.text-muted{color:var(--text-muted);}
.day-card{cursor:pointer;}
.day-card.locked{opacity:.45;cursor:not-allowed;}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.pin-btn.pinned{color:var(--warning);}
canvas{max-width:100%;}
#confettiCanvas{position:fixed;inset:0;pointer-events:none;z-index:999;}

@media(max-width:900px){
  #sidebar{position:fixed;left:0;top:0;transform:translateX(-100%);box-shadow:var(--shadow-lg);}
  #sidebar.open{transform:translateX(0);}
  #menuToggle{display:flex;}
  #viewport{padding:18px;}
}
</style>
</head>
<body data-theme="light">
<canvas id="confettiCanvas"></canvas>
<div id="app">
  <aside id="sidebar"></aside>
  <div id="main">
    <header id="header"></header>
    <main id="viewport"></main>
  </div>
</div>
<div id="modalRoot"></div>
<div id="toastWrap"></div>

<script>
window.APP_VERSION = "1.0.0";

/* STORE */
const STORAGE_KEY = "beja_v1_state";
class Store{
  static load(){
    try{ const raw = localStorage.getItem(STORAGE_KEY); if(raw) return JSON.parse(raw); }
    catch(e){ console.warn("Store load failed", e); }
    return null;
  }
  static save(state){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    catch(e){ console.warn("Store save failed", e); }
  }
  static clear(){ localStorage.removeItem(STORAGE_KEY); }
}

/* UTILS */
const Utils = {
  uid(prefix){ prefix = prefix || "id"; return prefix + "_" + Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4); },
  todayISO(){ return new Date().toISOString().slice(0,10); },
  fmtDate(iso){
    if(!iso) return "—";
    var d = new Date(iso+"T00:00:00");
    if(isNaN(d)) return iso;
    return d.toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"});
  },
  daysBetween(a,b){
    var d1 = new Date(a+"T00:00:00"), d2 = new Date(b+"T00:00:00");
    return Math.round((d2-d1)/86400000);
  },
  clamp(n,min,max){ return Math.max(min,Math.min(max,n)); },
  escapeHtml(str){
    if(str===undefined||str===null) return "";
    return String(str).replace(/[&<>"']/g, function(m){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]; });
  },
  debounce(fn, wait){
    var t; return function(){ var args=arguments; clearTimeout(t); t=setTimeout(function(){ fn.apply(null,args); }, wait); };
  },
  download(filename, content, mime){
    mime = mime || "text/plain";
    var blob = new Blob([content], {type: mime});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = filename; document.body.appendChild(a); a.click();
    a.remove(); URL.revokeObjectURL(url);
  },
  toCSV(rows, columns){
    var esc = function(v){ v = (v===undefined||v===null)?"":String(v); return /[",\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; };
    var header = columns.map(function(c){return esc(c.label);}).join(",");
    var body = rows.map(function(r){ return columns.map(function(c){return esc(r[c.key]);}).join(","); }).join("\n");
    return header + "\n" + body;
  },
  parseCSV(text){
    var rows = [];
    var row = [], field = "", inQuotes = false;
    for(var i=0;i<text.length;i++){
      var c = text[i];
      if(inQuotes){
        if(c === '"'){ if(text[i+1] === '"'){ field+='"'; i++; } else inQuotes = false; }
        else field += c;
      } else {
        if(c === '"') inQuotes = true;
        else if(c === ','){ row.push(field); field=""; }
        else if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=""; }
        else if(c === '\r'){ /* skip */ }
        else field += c;
      }
    }
    if(field.length || row.length){ row.push(field); rows.push(row); }
    return rows;
  }
};

/* TOAST */
const Toast = {
  show(msg, type, icon){
    type = type || "info";
    var wrap = document.getElementById("toastWrap");
    var el = document.createElement("div");
    el.className = "toast " + type;
    var ic = icon || (type==="success"?"✅":type==="error"?"⚠️":"ℹ️");
    el.innerHTML = "<span>"+ic+"</span><span>"+Utils.escapeHtml(msg)+"</span>";
    wrap.appendChild(el);
    setTimeout(function(){
      el.style.transition="opacity .3s ease, transform .3s ease";
      el.style.opacity="0"; el.style.transform="translateX(30px)";
      setTimeout(function(){ el.remove(); },300);
    }, 2800);
  }
};

/* CONFETTI */
const Confetti = {
  fire(){
    var canvas = document.getElementById("confettiCanvas");
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    var ctx = canvas.getContext("2d");
    var colors = ["#6366f1","#8b5cf6","#10b981","#f59e0b","#ef4444","#3b82f6"];
    var pieces = [];
    for(var i=0;i<140;i++){
      pieces.push({
        x: Math.random()*canvas.width, y: -20 - Math.random()*canvas.height*0.3,
        w: 6+Math.random()*6, h: 8+Math.random()*10,
        color: colors[Math.floor(Math.random()*colors.length)],
        rot: Math.random()*360, vRot: (Math.random()-0.5)*10,
        vy: 2+Math.random()*3.5, vx: (Math.random()-0.5)*3,
        opacity: 1
      });
    }
    var frame = 0;
    var maxFrames = 130;
    function tick(){
      frame++;
      ctx.clearRect(0,0,canvas.width,canvas.height);
      pieces.forEach(function(p){
        p.x += p.vx; p.y += p.vy; p.rot += p.vRot;
        if(frame > maxFrames*0.6) p.opacity -= 0.03;
        ctx.save();
        ctx.globalAlpha = Math.max(p.opacity,0);
        ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
        ctx.restore();
      });
      if(frame < maxFrames) requestAnimationFrame(tick);
      else ctx.clearRect(0,0,canvas.width,canvas.height);
    }
    tick();
  }
};

/* ============================================================
   STATIC REFERENCE DATA
============================================================ */
const STUDY_TOPICS = [
  {cat:"Backend Core", items:["Node.js","Express","Fastify","NestJS","TypeScript","REST API Design","GraphQL"]},
  {cat:"Databases", items:["PostgreSQL","MongoDB","Redis","Database Indexing","Transactions & ACID"]},

function computeStreak(s){
  var dates = Object.keys(s.dailyLogs||{}).filter(function(d){ var l=s.dailyLogs[d]; return l && ((l.applications||0)>0 || (l.studyHours||0)>0); });
  if(!dates.length) return 0;
  dates.sort();
  var streak = 0, cursor = Utils.todayISO();
  var set = {}; dates.forEach(function(d){set[d]=true;});
  while(set[cursor]){ streak++; var d=new Date(cursor+"T00:00:00"); d.setDate(d.getDate()-1); cursor=d.toISOString().slice(0,10); }
  return streak;
}
function totalDSASolved(s){
  var total = 0;
  DSA_CATEGORIES.forEach(function(c){ var e=s.dsa[c]; if(e) total += (e.solved||0); });
  return total;
}

    "Behavioral & HR Prep","Resume & LinkedIn Polish","Mock Technical Interview","Company-Specific Prep","Final Review & Offer Push"
  ];
  var roadmap = [];
  for(var i=0;i<30;i++){
    roadmap.push({
      day: i+1,
      theme: themes[i],

  });

  var systemDesign = SYSTEM_DESIGN_PROBLEMS.map(function(p){
    return {id:Utils.uid("sd"), name:p.name, difficulty:p.difficulty, progress:0, notes:""};
  });

  return {
    version: window.APP_VERSION,
    theme: "light",
    accent: "#6366f1",
    meta: { startDate: Utils.todayISO() },
    applications: [],
    companies: [],
    recruiters: [],
    interviews: [],
    resumes: [],
    study: study,
    dsa: dsa,
    systemDesign: systemDesign,
    questions: buildQuestionBank(),
    notes: [],
    roadmap: buildRoadmap(),
    planner: {},
    dailyLogs: {},
    achievementsUnlocked: [],
    pomodoro: { sessions: 0, focusMinutes: 0, log: [] },
    settings: { weekStart: "mon" }
  };
}

function mergeState(defaults, saved){
  if(!saved) return defaults;
  var merged = Object.assign({}, defaults, saved);
  // Deep-merge sub objects that may have grown new default keys over time
  merged.study = Object.assign({}, defaults.study, saved.study || {});
  merged.dsa = Object.assign({}, defaults.dsa, saved.dsa || {});
  merged.meta = Object.assign({}, defaults.meta, saved.meta || {});
  merged.pomodoro = Object.assign({}, defaults.pomodoro, saved.pomodoro || {});
  merged.settings = Object.assign({}, defaults.settings, saved.settings || {});
  merged.systemDesign = (saved.systemDesign && saved.systemDesign.length) ? saved.systemDesign : defaults.systemDesign;
  merged.roadmap = (saved.roadmap && saved.roadmap.length===30) ? saved.roadmap : defaults.roadmap;
  merged.questions = (saved.questions && saved.questions.length) ? saved.questions : defaults.questions;
  merged.applications = saved.applications || [];
  merged.companies = saved.companies || [];
  merged.recruiters = saved.recruiters || [];
  merged.interviews = saved.interviews || [];
  merged.resumes = saved.resumes || [];
  merged.notes = saved.notes || [];
  merged.planner = saved.planner || {};
  merged.dailyLogs = saved.dailyLogs || {};
  merged.achievementsUnlocked = saved.achievementsUnlocked || [];
  return merged;
}

const App = {
  state: mergeState(defaultState(), Store.load()),
  currentView: "dashboard",
  persist: Utils.debounce(function(){ Store.save(App.state); }, 250),
  save(){ this.persist(); },
  saveNow(){ Store.save(this.state); }
};

function currentDayNumber(){
  var n = Utils.daysBetween(App.state.meta.startDate, Utils.todayISO()) + 1;
  return Utils.clamp(n, 1, 30);
}
function daysLeft(){ return Utils.clamp(30 - currentDayNumber() + 1, 0, 30); }

function logToday(patch){
  var d = Utils.todayISO();
  if(!App.state.dailyLogs[d]) App.state.dailyLogs[d] = {applications:0, studyHours:0};
  Object.keys(patch).forEach(function(k){ App.state.dailyLogs[d][k] = (App.state.dailyLogs[d][k]||0) + patch[k]; });
}

function checkAchievements(){
  var newly = [];
  ACHIEVEMENT_DEFS.forEach(function(a){
    var already = App.state.achievementsUnlocked.indexOf(a.id) > -1;
    if(!already && a.check(App.state)){
      App.state.achievementsUnlocked.push(a.id);
      newly.push(a);
    }
  });
  if(newly.length){
    App.save();
    newly.forEach(function(a){
      Toast.show("Achievement unlocked: " + a.label, "success", a.icon);
    });
    Confetti.fire();
    if(App.currentView === "achievements") renderView();
  }
  return newly;
}

function hexToRgb(hex){
  hex = hex.replace("#","");
  if(hex.length===3) hex = hex.split("").map(function(c){return c+c;}).join("");
  var num = parseInt(hex,16);
  return {r:(num>>16)&255, g:(num>>8)&255, b:num&255};
}

function weekRange(){
  var d = new Date();
  var day = d.getDay();
  var diffToMonday = (day===0?-6:1-day);
  var monday = new Date(d); monday.setDate(d.getDate()+diffToMonday);
  var dates = [];
  for(var i=0;i<7;i++){ var x=new Date(monday); x.setDate(monday.getDate()+i); dates.push(x.toISOString().slice(0,10)); }
  return dates;
}
function appsInRange(dates){
  var s = App.state;
  return s.applications.filter(function(a){ return dates.indexOf(a.appliedDate) > -1; }).length;
}
function studyHoursTotal(){
  var s = App.state, total = 0;
  Object.keys(s.study).forEach(function(k){ total += (s.study[k].hours||0); });
  return total;
}
function studyProgressPct(){
  var s = App.state, keys = Object.keys(s.study);
  var done = keys.filter(function(k){ return s.study[k].done; }).length;
  return keys.length ? Math.round(done/keys.length*100) : 0;
}
function overallGoalPct(){
  var roadmapPct = App.state.roadmap.reduce(function(a,d){return a+d.completion;},0) / (30*100) * 100;
  var studyPct = studyProgressPct();
  var dsaPct = Math.min(100, totalDSASolved(App.state) / 150 * 100);
  var appPct = Math.min(100, App.state.applications.length / 100 * 100);
  return Math.round((roadmapPct*0.35 + studyPct*0.25 + dsaPct*0.2 + appPct*0.2));
}

function circularProgress(pct, size, label, sub){
  size = size || 84;
  var r = size/2 - 7, c = 2*Math.PI*r;
  var offset = c - (Utils.clamp(pct,0,100)/100)*c;
  return '' +
  '<div style="position:relative;width:'+size+'px;height:'+size+'px;">' +
    '<svg width="'+size+'" height="'+size+'" style="transform:rotate(-90deg);">' +
      '<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" stroke="var(--bg-hover)" stroke-width="7" fill="none"/>' +
      '<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" stroke="url(#gradA)" stroke-width="7" fill="none" ' +
        'stroke-dasharray="'+c+'" stroke-dashoffset="'+c+'" style="transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1);" data-target-offset="'+offset+'" class="circ-anim"/>' +
      '<defs><linearGradient id="gradA" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="var(--accent)"/><stop offset="100%" stop-color="var(--accent-2)"/></linearGradient></defs>' +
    '</svg>' +
    '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;">' +
      '<div style="font-size:16px;font-weight:800;">'+Math.round(pct)+'%</div>' +
    '</div>' +
  '</div>';
}

function kpiCard(icon, label, value, trend, extra){
  return '' +
  '<div class="card kpi-card">' +
    '<div class="kpi-top"><div class="kpi-icon">'+icon+'</div>' + (trend ? '<div class="kpi-trend '+(trend.up?"trend-up":"trend-down")+'">'+(trend.up?"▲":"▼")+' '+trend.text+'</div>' : '') + '</div>' +
    '<div class="kpi-value" data-count-target="'+value+'">0</div>' +
    '<div class="kpi-label">'+label+'</div>' +
    (extra||'') +
  '</div>';
}

function animateCounters(){
  document.querySelectorAll("[data-count-target]").forEach(function(el){
    var target = parseFloat(el.getAttribute("data-count-target"));
    var isFloat = target % 1 !== 0;
    var start = 0, duration = 800, startTime = null;
    function step(ts){
      if(!startTime) startTime = ts;
      var progress = Math.min((ts-startTime)/duration, 1);
      var eased = 1 - Math.pow(1-progress, 3);
      var val = start + (target-start)*eased;
      el.textContent = isFloat ? val.toFixed(1) : Math.round(val);
      if(progress < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  });
}
function animateCircles(){
  requestAnimationFrame(function(){
    document.querySelectorAll(".circ-anim").forEach(function(c){
      var target = c.getAttribute("data-target-offset");
      requestAnimationFrame(function(){ c.style.strokeDashoffset = target; });
    });
  });
}

function field(label, id, value, placeholder, type){

  return '<div class="field"><label>'+label+'</label><input type="'+type+'" id="'+id+'" value="'+Utils.escapeHtml(value||"")+'" placeholder="'+(placeholder||"")+'"></div>';
}
function selectField(label, id, options, selected){
  var opts = options.map(function(o){ return '<option value="'+o+'"'+(o===selected?' selected':'')+'>'+o+'</option>'; }).join("");
  return '<div class="field"><label>'+label+'</label><select id="'+id+'">'+opts+'</select></div>';
}
function val(id){ var el = document.getElementById(id); return el ? el.value.trim() : ""; }

function exportApplicationsCSV(){
  var cols = [
    {key:"company",label:"Company"},{key:"role",label:"Role"},{key:"location",label:"Location"},{key:"salary",label:"Salary"},
    {key:"source",label:"Source"},{key:"appliedDate",label:"Applied Date"},{key:"recruiter",label:"Recruiter"},{key:"status",label:"Status"},
    {key:"priority",label:"Priority"},{key:"interviewDate",label:"Interview Date"},{key:"followUpDate",label:"Follow-up Date"},
    {key:"resumeVersion",label:"Resume Version"},{key:"jobUrl",label:"Job URL"},{key:"notes",label:"Notes"}
  ];
  var csv = Utils.toCSV(App.state.applications, cols);
  Utils.download("applications.csv", csv, "text/csv");
  Toast.show("Applications exported", "success");
}
function importApplicationsCSV(e){
  var file = e.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(ev){
    try{
      var rows = Utils.parseCSV(ev.target.result);
      var header = rows.shift().map(function(h){return h.trim();});
      var keyMap = {"Company":"company","Role":"role","Location":"location","Salary":"salary","Source":"source","Applied Date":"appliedDate","Recruiter":"recruiter","Status":"status","Priority":"priority","Interview Date":"interviewDate","Follow-up Date":"followUpDate","Resume Version":"resumeVersion","Job URL":"jobUrl","Notes":"notes"};
      var added = 0;
      rows.forEach(function(r){
        if(r.length===1 && r[0]==="") return;
        var obj = {id: Utils.uid("app"), status:"Applied", priority:"Medium"};
        header.forEach(function(h,i){ if(keyMap[h]) obj[keyMap[h]] = r[i]; });
        if(obj.company){ App.state.applications.push(obj); added++; }
      });
      App.save(); renderView(); renderSidebar();
      Toast.show(added + " applications imported", "success");
    }catch(err){ Toast.show("Import failed: invalid CSV", "error"); }
  };
  reader.readAsText(file);
  e.target.value = "";
}

    });
  });

    inp.addEventListener("change", function(){
      var topic = inp.getAttribute("data-study-hours");

      App.save(); renderView();
    });
  });
};

let qFilters = { search:"", category:"", favOnly:false };
VIEW_RENDERERS.questions = function(){
  var s = App.state;
  var cats = Array.from(new Set(s.questions.map(function(q){return q.category;}))).sort();
  var rows = s.questions.slice();
  if(qFilters.search){
    var q = qFilters.search.toLowerCase();
    rows = rows.filter(function(x){ return x.question.toLowerCase().indexOf(q)>-1 || x.category.toLowerCase().indexOf(q)>-1; });
  }
  if(qFilters.category) rows = rows.filter(function(x){return x.category===qFilters.category;});
  if(qFilters.favOnly) rows = rows.filter(function(x){return x.favorite;});

  var completedCount = s.questions.filter(function(q){return q.completed;}).length;
  var html = '<div class="page-head"><div><h1>Interview Question Bank</h1><p>'+s.questions.length+' curated questions · '+completedCount+' reviewed</p></div>' +
    '<button class="btn btn-primary" id="addQuestionBtn">+ Add Question</button></div>';

  html += '<div class="toolbar">';
  html += '<input type="search" id="qSearch" placeholder="Search questions..." value="'+Utils.escapeHtml(qFilters.search)+'">';
  html += '<select id="qCategoryFilter"><option value="">All Categories</option>' + cats.map(function(c){return '<option value="'+c+'"'+(qFilters.category===c?' selected':'')+'>'+c+'</option>';}).join("") + '</select>';
  html += '<button class="btn btn-sm" id="qFavToggle">'+(qFilters.favOnly?'★ Favorites Only':'☆ Show Favorites')+'</button>';
  html += '</div>';

  if(!rows.length){
    html += '<div class="card"><div class="empty-state"><div class="em-icon">❓</div><div>No questions match your filters.</div></div></div>';
    return html;
  }

  html += '<div style="display:flex;flex-direction:column;gap:10px;">';
  rows.forEach(function(q){
    html += '<div class="card" style="padding:0;overflow:hidden;">' +
      '<div style="padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;" data-toggle-q="'+q.id+'">' +
        '<span class="badge badge-blue">'+q.category+'</span>' +
        '<span class="badge '+(q.difficulty==="Easy"?"badge-green":q.difficulty==="Medium"?"badge-yellow":"badge-red")+'">'+q.difficulty+'</span>' +
        '<strong style="flex:1;font-size:13.3px;">'+Utils.escapeHtml(q.question)+'</strong>' +
        '<button class="icon-btn pin-btn '+(q.favorite?'pinned':'')+'" data-fav-q="'+q.id+'" title="Favorite">★</button>' +
        (q.completed ? '<span class="badge badge-green">✓ Reviewed</span>' : '') +
      '</div>' +
      '<div class="q-answer hidden" id="ans-'+q.id+'" style="padding:0 16px 16px;font-size:13px;color:var(--text-muted);border-top:1px solid var(--border);">' +
        '<div style="padding-top:12px;">'+Utils.escapeHtml(q.answer)+'</div>' +
        '<div style="margin-top:10px;display:flex;gap:8px;">' +
          '<button class="btn btn-sm" data-complete-q="'+q.id+'">'+(q.completed?'Mark Unreviewed':'Mark Reviewed')+'</button>' +
          '<button class="btn btn-sm btn-danger" data-del-q="'+q.id+'">🗑 Remove</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  });
  html += '</div>';
  return html;
};

/* ============================================================
   DAILY PLANNER
============================================================ */
const PLANNER_BLOCKS = [
  {id:"morning", label:"🌅 Morning", sub:"Job Applications"},
  {id:"afternoon", label:"☀️ Afternoon", sub:"Backend Learning"},
  {id:"evening", label:"🌆 Evening", sub:"DSA Practice"},
  {id:"night", label:"🌙 Night", sub:"Mock Interview / Review"}
];
let plannerDate = Utils.todayISO();
function getPlannerDay(dateISO){
  if(!App.state.planner[dateISO]) App.state.planner[dateISO] = {morning:[],afternoon:[],evening:[],night:[]};
  return App.state.planner[dateISO];
}
VIEW_RENDERERS.planner = function(){
  var day = getPlannerDay(plannerDate);
  var totalTasks = 0, doneTasks = 0;
  PLANNER_BLOCKS.forEach(function(b){ totalTasks += day[b.id].length; doneTasks += day[b.id].filter(function(t){return t.done;}).length; });
  var pct = totalTasks ? Math.round(doneTasks/totalTasks*100) : 0;

  var html = '<div class="page-head"><div><h1>Daily Planner</h1><p>'+doneTasks+' / '+totalTasks+' tasks complete ('+pct+'%)</p></div>' +
    '<input type="date" id="plannerDateInput" value="'+plannerDate+'" class="btn btn-sm" style="cursor:pointer;"></div>';
  html += '<div class="grid grid-4">';
  PLANNER_BLOCKS.forEach(function(b){
    html += '<div class="card">' +
      '<div class="section-title">'+b.label+' <span class="tag">'+b.sub+'</span></div>';
    day[b.id].forEach(function(t){
      html += '<div class="flex-between" style="padding:7px 0;border-bottom:1px solid var(--border);gap:8px;">' +
        '<label style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;">' +
          '<input type="checkbox" data-task="'+b.id+'|'+t.id+'" '+(t.done?'checked':'')+' style="width:15px;height:15px;flex-shrink:0;">' +
          '<span style="font-size:12.5px;'+(t.done?'text-decoration:line-through;color:var(--text-faint);':'')+'overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+Utils.escapeHtml(t.text)+'</span>' +
        '</label>' +
        priorityDot(t.priority) +
        '<button class="icon-btn" style="width:26px;height:26px;font-size:11px;" data-del-task="'+b.id+'|'+t.id+'">✕</button>' +
      '</div>';
    });
    html += '<div style="margin-top:10px;"><input type="text" placeholder="+ Add task, press Enter" data-add-task="'+b.id+'" style="width:100%;padding:7px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg-hover);font-size:12.5px;outline:none;"></div>';
    html += '</div>';
  });
  html += '</div>';
  return html;
};
function priorityDot(p){
  var color = p==="High" ? "var(--danger)" : p==="Medium" ? "var(--warning)" : "var(--text-faint)";
  return '<span class="status-dot" style="background:'+color+';flex-shrink:0;" title="'+ (p||"Low") +' priority"></span>';
}
VIEW_POST_RENDER.planner = function(){
  document.getElementById("plannerDateInput").addEventListener("change", function(e){ plannerDate = e.target.value; renderView(); });
  document.querySelectorAll("[data-add-task]").forEach(function(inp){
    inp.addEventListener("keydown", function(e){
      if(e.key === "Enter" && inp.value.trim()){
        var block = inp.getAttribute("data-add-task");
        getPlannerDay(plannerDate)[block].push({id:Utils.uid("t"), text:inp.value.trim(), done:false, priority:"Medium"});
        App.save(); renderView();
      }
    });
  });
  document.querySelectorAll("[data-task]").forEach(function(cb){
    cb.addEventListener("change", function(){
      var parts = cb.getAttribute("data-task").split("|");
      var task = getPlannerDay(plannerDate)[parts[0]].find(function(t){return t.id===parts[1];});
      task.done = cb.checked; App.save(); renderView();
    });
  });
  document.querySelectorAll("[data-del-task]").forEach(function(btn){
    btn.addEventListener("click", function(){
      var parts = btn.getAttribute("data-del-task").split("|");
      var arr = getPlannerDay(plannerDate)[parts[0]];
      getPlannerDay(plannerDate)[parts[0]] = arr.filter(function(t){return t.id!==parts[1];});
      App.save(); renderView();
    });
  });
};

    '</div>';
  });

};

/* ============================================================
   ANALYTICS — Canvas Charts
============================================================ */
function drawBarChart(canvas, labels, values, color){
  var ctx = canvas.getContext("2d");
  var dpr = window.devicePixelRatio || 1;
  var w = canvas.clientWidth, h = canvas.clientHeight;
  canvas.width = w*dpr; canvas.height = h*dpr; ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);
  var textColor = getComputedStyle(document.body).getPropertyValue("--text-muted").trim() || "#888";
  var max = Math.max.apply(null, values.concat([1]));
  var padL = 30, padB = 24, padT = 12, padR = 10;
  var chartW = w - padL - padR, chartH = h - padB - padT;
  var barW = chartW / values.length * 0.6;
  var gap = chartW / values.length;
  ctx.strokeStyle = "rgba(128,128,128,0.15)";
  ctx.beginPath();
  for(var g=0; g<=4; g++){
    var y = padT + chartH - (g/4)*chartH;
    ctx.moveTo(padL, y); ctx.lineTo(w-padR, y);
  }
  ctx.stroke();
  ctx.fillStyle = textColor; ctx.font = "10px sans-serif"; ctx.textAlign="right";
  for(var g2=0; g2<=4; g2++){
    var val = Math.round(max*g2/4);
    var y2 = padT + chartH - (g2/4)*chartH;
    ctx.fillText(val, padL-6, y2+3);
  }
  values.forEach(function(v,i){
    var barH = max ? (v/max)*chartH : 0;
    var x = padL + i*gap + (gap-barW)/2;
    var y = padT + chartH - barH;
    var grad = ctx.createLinearGradient(0,y,0,padT+chartH);
    grad.addColorStop(0, color || "#6366f1");
    grad.addColorStop(1, "rgba(99,102,241,0.3)");
    ctx.fillStyle = grad;
    roundRect(ctx, x, y, barW, barH, 4);
    ctx.fill();
    ctx.fillStyle = textColor; ctx.font = "10px sans-serif"; ctx.textAlign = "center";
    ctx.fillText(labels[i], x+barW/2, h-6);
  });
}
function roundRect(ctx,x,y,w,h,r){
  if(h<=0) h=0.001;
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function drawLineChart(canvas, labels, values, color){
  var ctx = canvas.getContext("2d");
  var dpr = window.devicePixelRatio || 1;
  var w = canvas.clientWidth, h = canvas.clientHeight;
  canvas.width = w*dpr; canvas.height = h*dpr; ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);
  var textColor = getComputedStyle(document.body).getPropertyValue("--text-muted").trim() || "#888";
  var max = Math.max.apply(null, values.concat([1]));
  var padL = 30, padB = 24, padT = 12, padR = 14;
  var chartW = w - padL - padR, chartH = h - padB - padT;
  ctx.strokeStyle = "rgba(128,128,128,0.15)";
  ctx.beginPath();
  for(var g=0; g<=4; g++){ var y = padT + chartH - (g/4)*chartH; ctx.moveTo(padL,y); ctx.lineTo(w-padR,y); }
  ctx.stroke();
  var pts = values.map(function(v,i){
    return { x: padL + (values.length>1 ? i/(values.length-1)*chartW : chartW/2), y: padT + chartH - (max? v/max*chartH : 0) };
  });
  var grad = ctx.createLinearGradient(0,padT,0,padT+chartH);
  grad.addColorStop(0, (color||"#6366f1")+"55"); grad.addColorStop(1,(color||"#6366f1")+"00");
  ctx.beginPath();
  ctx.moveTo(pts[0].x, padT+chartH);
  pts.forEach(function(p){ ctx.lineTo(p.x,p.y); });
  ctx.lineTo(pts[pts.length-1].x, padT+chartH);
  ctx.closePath(); ctx.fillStyle = grad; ctx.fill();
  ctx.beginPath();
  pts.forEach(function(p,i){ if(i===0) ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y); });
  ctx.strokeStyle = color || "#6366f1"; ctx.lineWidth = 2.5; ctx.stroke();
  pts.forEach(function(p){ ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fillStyle = color||"#6366f1"; ctx.fill(); });
  ctx.fillStyle = textColor; ctx.font = "10px sans-serif"; ctx.textAlign="center";
  labels.forEach(function(l,i){ ctx.fillText(l, pts[i].x, h-6); });
}
function drawPieChart(canvas, labels, values, colors){
  var ctx = canvas.getContext("2d");
  var dpr = window.devicePixelRatio || 1;
  var w = canvas.clientWidth, h = canvas.clientHeight;
  canvas.width = w*dpr; canvas.height = h*dpr; ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);
  var total = values.reduce(function(a,b){return a+b;},0) || 1;
  var cx = w*0.32, cy = h/2, r = Math.min(cx,cy)-8;
  var start = -Math.PI/2;
  values.forEach(function(v,i){
    var angle = v/total*Math.PI*2;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,start,start+angle);
    ctx.closePath();
    ctx.fillStyle = colors[i % colors.length];
    ctx.fill();
    start += angle;
  });
  ctx.globalCompositeOperation = "destination-out";
  ctx.beginPath(); ctx.arc(cx,cy,r*0.55,0,Math.PI*2); ctx.fill();
  ctx.globalCompositeOperation = "source-over";
  var textColor = getComputedStyle(document.body).getPropertyValue("--text").trim() || "#111";
  var legendX = w*0.62, legendY = 16;
  ctx.textAlign = "left"; ctx.font = "11px sans-serif";
  labels.forEach(function(l,i){
    ctx.fillStyle = colors[i % colors.length];
    ctx.fillRect(legendX, legendY+i*20, 10, 10);
    ctx.fillStyle = textColor;
    ctx.fillText(l + " (" + values[i] + ")", legendX+16, legendY+i*20+9);
  });
}

const Pomodoro = {
  duration: 25*60,
  remaining: 25*60,
  running: false,
  intervalId: null,
  mode: "25",
  start(){
    if(this.running) return;
    this.running = true;
    var self = this;
    this.intervalId = setInterval(function(){
      self.remaining--;
      if(self.remaining <= 0){
        self.complete();
      }
      updatePomodoroDisplay();
    }, 1000);
  },
  pause(){ this.running = false; clearInterval(this.intervalId); },
  reset(){
    this.pause();
    this.remaining = this.duration;
    updatePomodoroDisplay();
  },
  complete(){
    this.pause();
    this.remaining = 0;
    updatePomodoroDisplay();
    App.state.pomodoro.sessions++;
    App.state.pomodoro.focusMinutes += Math.round(this.duration/60);
    App.state.pomodoro.log.push({date:Utils.todayISO(), minutes:Math.round(this.duration/60)});
    logToday({studyHours: this.duration/3600});
    App.save();
    Toast.show("Pomodoro session complete! 🎉", "success");
    Confetti.fire();
    this.remaining = this.duration;
    if(App.currentView === "pomodoro") renderView();
  },
  setDuration(minutes){
    this.duration = minutes*60;
    this.remaining = minutes*60;
    this.mode = String(minutes);
    updatePomodoroDisplay();
  }
};

function backupJSON(){
  Utils.download("job-accelerator-backup-"+Utils.todayISO()+".json", JSON.stringify(App.state, null, 2), "application/json");
  Toast.show("Backup downloaded","success");
}
function restoreJSON(e){
  var file = e.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(ev){
    try{
      var parsed = JSON.parse(ev.target.result);
      App.state = mergeState(defaultState(), parsed);
      App.saveNow();
      applyTheme();
      navigateTo("dashboard");
      Toast.show("Data restored successfully","success");
    }catch(err){ Toast.show("Restore failed: invalid JSON file","error"); }
  };
  reader.readAsText(file);
  e.target.value = "";
}

    query = (query||"").toLowerCase();
    var matches = allNav.filter(function(it){ return it.label.toLowerCase().indexOf(query) > -1; });
    results.innerHTML = matches.map(function(it){
      return '<div class="nav-item" data-cmd-nav="'+it.id+'" style="cursor:pointer;"><span class="nav-icon">'+it.icon+'</span><span>'+it.label+'</span></div>';
    }).join("") || '<div class="text-muted" style="padding:10px;font-size:13px;">No matches</div>';
    results.querySelectorAll("[data-cmd-nav]").forEach(function(el){
      el.addEventListener("click", function(){ navigateTo(el.getAttribute("data-cmd-nav")); closeModal(); });
    });
  }
  renderResults("");
  input.addEventListener("input", function(){ renderResults(input.value); });
  input.focus();
}
